<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🍓 Strawberry Bot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0f0f1a;color:#e0e0e0;min-height:100vh;
  display:flex;flex-direction:column;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation
}
.header{
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  padding:20px 16px;text-align:center;
  border-bottom:1px solid #2a2a4a
}
.header h1{font-size:22px;margin-bottom:4px}
.header h1 span{color:#ff6b6b}
.header .sub{font-size:12px;color:#888;margin-top:4px}
.balance{
  background:linear-gradient(135deg,#1a1a2e,#2d1b3d);
  margin:16px;padding:20px;border-radius:16px;
  text-align:center;border:1px solid #3a3a5a
}
.balance .label{font-size:12px;color:#888;text-transform:uppercase}
.balance .amount{font-size:32px;font-weight:700;margin:8px 0;color:#4ecdc4}
.balance .change{font-size:14px}
.balance .change.pos{color:#4ecdc4}
.balance .change.neg{color:#ff6b6b}
.strategies{padding:0 16px;flex:1}
.strategy{
  background:#1a1a2e;border-radius:12px;padding:16px;
  margin-bottom:12px;border:1px solid #2a2a4a;
  cursor:pointer;transition:.2s;
  -webkit-tap-highlight-color:transparent
}
.strategy:active{transform:scale(.98);background:#222244}
.strategy .top{display:flex;justify-content:space-between;align-items:center}
.strategy .name{font-size:16px;font-weight:600}
.strategy .status{font-size:12px;padding:4px 10px;border-radius:20px}
.status.on{background:#1a3a2a;color:#4ecdc4}
.status.off{background:#3a1a1a;color:#ff6b6b}
.strategy .stats{display:flex;gap:16px;margin-top:12px;font-size:13px;color:#888}
.strategy .stats span{display:flex;align-items:center;gap:4px}
.strategy .stats .val{color:#e0e0e0;font-weight:600}
.strategy .stats .val.green{color:#4ecdc4}
.strategy .stats .val.red{color:#ff6b6b}
.menu-bar{
  display:flex;background:#1a1a2e;border-top:1px solid #2a2a4a;
  position:sticky;bottom:0
}
.menu-bar button{
  flex:1;padding:14px 8px;background:none;border:none;
  color:#888;font-size:11px;cursor:pointer;transition:.2s;
  display:flex;flex-direction:column;align-items:center;gap:4px
}
.menu-bar button .icon{font-size:20px}
.menu-bar button.active{color:#4ecdc4;background:#222244}
.page{display:none;flex-direction:column;flex:1}
.page.active{display:flex}
.page-content{padding:16px;flex:1}
.btn{
  display:block;width:100%;padding:14px;border:none;
  border-radius:12px;font-size:16px;font-weight:600;
  cursor:pointer;transition:.2s;text-align:center;
  text-decoration:none
}
.btn.primary{background:#4ecdc4;color:#0f0f1a}
.btn.primary:active{transform:scale(.97)}
.btn.secondary{background:#2a2a4a;color:#e0e0e0;margin-top:8px}
.modal{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center
}
.modal.show{display:flex}
.modal-content{
  background:#1a1a2e;border-radius:16px;padding:24px;
  width:90%;max-width:360px;border:1px solid #2a2a4a
}
.modal-content h3{margin-bottom:16px}
.modal-content input{
  width:100%;padding:12px;border:1px solid #3a3a5a;
  border-radius:8px;background:#0f0f1a;color:#e0e0e0;
  font-size:16px;margin-bottom:12px
}
.modal-content .btn{margin-top:8px}
.history-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;border-bottom:1px solid #2a2a4a;font-size:14px
}
.history-item .match{flex:1}
.history-item .match .teams{color:#e0e0e0}
.history-item .match .meta{font-size:11px;color:#666;margin-top:2px}
.history-item .result{font-weight:600;font-size:13px}
.history-item .result.win{color:#4ecdc4}
.history-item .result.loss{color:#ff6b6b}
.empty-state{text-align:center;padding:40px 20px;color:#666}
.empty-state .icon{font-size:48px;margin-bottom:16px}
.bank-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.bank-stat{background:#1a1a2e;padding:12px;border-radius:8px;text-align:center;border:1px solid #2a2a4a}
.bank-stat .num{font-size:20px;font-weight:700;color:#4ecdc4}
.bank-stat .lbl{font-size:11px;color:#666;margin-top:2px}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1><span>🍓</span> Strawberry Bot</h1>
  <div class="sub">Hermes Betting · Виртуальный банк</div>
</div>

<!-- Страница: Банк -->
<div id="page-bank" class="page active">
  <div class="balance">
    <div class="label">Баланс банка</div>
    <div class="amount" id="balance-amount">10 000 ₽</div>
    <div class="change pos" id="balance-change">+0 ₽ (0%)</div>
  </div>
  <div class="page-content">
    <div class="bank-grid">
      <div class="bank-stat"><div class="num" id="stat-bets">0</div><div class="lbl">Ставок</div></div>
      <div class="bank-stat"><div class="num" id="stat-wins">0</div><div class="lbl">Выигрышей</div></div>
      <div class="bank-stat"><div class="num" id="stat-losses">0</div><div class="lbl">Проигрышей</div></div>
      <div class="bank-stat"><div class="num" id="stat-roi" style="color:#888">0%</div><div class="lbl">ROI</div></div>
    </div>
    <button class="btn primary" onclick="showModal('bet')">➕ Новая ставка</button>
    <button class="btn secondary" onclick="switchPage('strategies')">📊 К стратегиям</button>
  </div>
</div>

<!-- Страница: Стратегии -->
<div id="page-strategies" class="page">
  <div class="page-content">
    <div id="strategies-list"></div>
    <button class="btn primary" onclick="switchPage('history')">📋 История ставок</button>
    <button class="btn secondary" onclick="switchPage('bank')">💰 К банку</button>
  </div>
</div>

<!-- Страница: История -->
<div id="page-history" class="page">
  <div class="page-content">
    <h2 style="margin-bottom:16px;font-size:18px">История ставок</h2>
    <div id="history-list"></div>
    <button class="btn secondary" onclick="switchPage('strategies')" style="margin-top:16px">← Назад</button>
  </div>
</div>

<!-- Страница: Детали стратегии -->
<div id="page-detail" class="page">
  <div class="page-content">
    <h2 id="detail-title" style="margin-bottom:16px;font-size:18px"></h2>
    <div id="detail-stats" class="bank-grid" style="grid-template-columns:1fr 1fr 1fr"></div>
    <div id="detail-history"></div>
    <button class="btn secondary" onclick="switchPage('strategies')" style="margin-top:16px">← Назад</button>
  </div>
</div>

<!-- Модалка: добавить ставку -->
<div id="modal-bet" class="modal">
  <div class="modal-content">
    <h3>➕ Новая ставка</h3>
    <select id="bet-strategy" style="width:100%;padding:12px;border:1px solid #3a3a5a;border-radius:8px;background:#0f0f1a;color:#e0e0e0;font-size:16px;margin-bottom:12px">
      <option value="klubnika">🍓 Клубника</option>
      <option value="p1_iz_1x">⚽️ П1 из 1X</option>
      <option value="basketball">🏀 Баскетбол</option>
    </select>
    <input id="bet-match" placeholder="Матч (Команда1 - Команда2)">
    <input id="bet-outcome" placeholder="Исход (П1/X/П2)">
    <input id="bet-odds" placeholder="Коэффициент" type="number" step="0.01">
    <input id="bet-stake" placeholder="Сумма (по умолч. 500₽)" type="number">
    <button class="btn primary" onclick="placeBet()">✅ Поставить</button>
    <button class="btn secondary" onclick="hideModal('bet')">Отмена</button>
  </div>
</div>

<!-- Нижнее меню -->
<div class="menu-bar">
  <button class="active" onclick="switchPage('bank')"><span class="icon">💰</span>Банк</button>
  <button onclick="switchPage('strategies')"><span class="icon">📊</span>Стратегии</button>
  <button onclick="switchPage('history')"><span class="icon">📋</span>История</button>
  <button onclick="showModal('bet')"><span class="icon">➕</span>Ставка</button>
</div>

<script>
const state = {
  bank: {
    startBalance: 10000,
    currentBalance: 10000,
    totalBets: 0,
    wins: 0,
    losses: 0,
    totalProfit: 0
  },
  strategies: [
    {id:'klubnika',name:'🍓 Клубника',desc:'Прогрузы Betexplorer',status:'on',bets:0,wins:0,losses:0,profit:0,color:'#ff6b6b'},
    {id:'p1_iz_1x',name:'⚽️ П1 из 1X',desc:'Zulubet / RoboBet 1X',status:'on',bets:0,wins:0,losses:0,profit:0,color:'#4ecdc4'},
    {id:'basketball',name:'🏀 Баскетбол',desc:'Скоро',status:'off',bets:0,wins:0,losses:0,profit:0,color:'#ffd93d'}
  ],
  history: []
};

function formatMoney(n){return (n>0?'+':'')+n.toLocaleString('ru-RU')+' ₽'}

function updateBank(){
  const b=state.bank;
  document.getElementById('balance-amount').textContent=b.currentBalance.toLocaleString('ru-RU')+' ₽';
  const diff=b.currentBalance-b.startBalance;
  const pct=b.startBalance?((diff/b.startBalance)*100).toFixed(2):0;
  const el=document.getElementById('balance-change');
  el.textContent=(diff>=0?'+':'')+diff.toLocaleString('ru-RU')+' ₽ ('+(diff>=0?'+':'')+pct+'%)';
  el.className='change'+(diff>=0?' pos':' neg');
  document.getElementById('stat-bets').textContent=b.totalBets;
  document.getElementById('stat-wins').textContent=b.wins;
  document.getElementById('stat-losses').textContent=b.losses;
  const roi=b.totalBets>0?((b.totalProfit/(b.totalBets*500))*100).toFixed(1):'0.0';
  const roiEl=document.getElementById('stat-roi');
  roiEl.textContent=roi+'%';
  roiEl.style.color=parseFloat(roi)>0?'#4ecdc4':parseFloat(roi)<0?'#ff6b6b':'#888';
}

function updateStrategies(){
  const list=document.getElementById('strategies-list');
  list.innerHTML='';
  state.strategies.forEach(s=>{
    const div=document.createElement('div');
    div.className='strategy';
    div.onclick=()=>showDetail(s.id);
    const pct=s.bets>0?((s.profit/(s.bets*500))*100).toFixed(1):'0.0';
    div.innerHTML=\`
      <div class="top">
        <div><div class="name">\${s.name}</div><div style="font-size:12px;color:#666">\${s.desc}</div></div>
        <span class="status \${s.status}">\${s.status==='on'?'✅ Активна':'⏸ В разработке'}</span>
      </div>
      <div class="stats">
        <span>Ставок: <span class="val">\${s.bets}</span></span>
        <span>W/L: <span class="val green">\${s.wins}</span>/<span class="val red">\${s.losses}</span></span>
        <span>P&L: <span class="val \${s.profit>=0?'green':'red'}">\${formatMoney(s.profit)}</span></span>
        <span>ROI: <span class="val">\${pct}%</span></span>
      </div>
    \`;
    list.appendChild(div);
  });
}

function showDetail(id){
  const s=state.strategies.find(x=>x.id===id);
  if(!s)return;
  document.getElementById('detail-title').textContent=s.name+' — детали';
  const stats=document.getElementById('detail-stats');
  const pct=s.bets>0?((s.profit/(s.bets*500))*100).toFixed(1):'0.0';
  stats.innerHTML=\`
    <div class="bank-stat"><div class="num">\${s.bets}</div><div class="lbl">Ставок</div></div>
    <div class="bank-stat"><div class="num" style="color:#4ecdc4">\${s.wins}</div><div class="lbl">Wins</div></div>
    <div class="bank-stat"><div class="num" style="color:#ff6b6b">\${s.losses}</div><div class="lbl">Losses</div></div>
  \`;
  const hist=document.getElementById('detail-history');
  const h=state.history.filter(x=>x.strategy===id);
  if(h.length===0){
    hist.innerHTML='<div class="empty-state"><div class="icon">📭</div>Нет ставок</div>';
  }else{
    hist.innerHTML='<h3 style="margin:16px 0 8px;font-size:14px;color:#888">История</h3>';
    h.reverse().forEach(item=>{
      hist.innerHTML+=\`
        <div class="history-item">
          <div class="match">
            <div class="teams">\${item.match}</div>
            <div class="meta">\${item.date} · \${item.outcome} @ \${item.odds.toFixed(2)}</div>
          </div>
          <div class="result \${item.result}">\${item.result==='win'?'✅ +'+((item.odds-1)*item.stake).toFixed(0)+'₽':'❌ -'+item.stake+'₽'}</div>
        </div>
      \`;
    });
  }
  switchPage('detail');
}

function updateHistory(){
  const list=document.getElementById('history-list');
  if(state.history.length===0){
    list.innerHTML='<div class="empty-state"><div class="icon">📭</div>Нет ставок<br><span style="font-size:13px">Добавьте первую через меню</span></div>';
    return;
  }
  list.innerHTML='';
  state.history.slice().reverse().forEach(item=>{
    const div=document.createElement('div');
    div.className='history-item';
    const s=state.strategies.find(x=>x.id===item.strategy);
    div.innerHTML=\`
      <div class="match">
        <div class="teams">\${s?s.name+' ':''} \${item.match}</div>
        <div class="meta">\${item.date} · \${item.outcome} @ \${item.odds.toFixed(2)} · \${item.stake}₽</div>
      </div>
      <div class="result \${item.result}">\${item.result==='win'?'✅ +'+((item.odds-1)*item.stake).toFixed(0)+'₽':'❌ -'+item.stake+'₽'}</div>
    \`;
    list.appendChild(div);
  });
}

function placeBet(){
  const strategy=document.getElementById('bet-strategy').value;
  const match=document.getElementById('bet-match').value.trim();
  const outcome=document.getElementById('bet-outcome').value.trim().toUpperCase();
  const odds=parseFloat(document.getElementById('bet-odds').value);
  const stake=parseFloat(document.getElementById('bet-stake').value)||500;
  if(!match||!outcome||!odds){alert('Заполните все поля');return}
  
  state.history.push({
    strategy, match, outcome, odds, stake,
    date:new Date().toLocaleDateString('ru-RU'),
    result:'pending'
  });
  
  const s=state.strategies.find(x=>x.id===strategy);
  if(s){s.bets++}
  state.bank.totalBets++;
  
  updateAll();
  hideModal('bet');
  document.getElementById('bet-match').value='';
  document.getElementById('bet-outcome').value='';
  document.getElementById('bet-odds').value='';
  document.getElementById('bet-stake').value='';
  switchPage('history');
}

function settleBet(index,result){
  const item=state.history[index];
  if(!item||item.result!=='pending')return;
  item.result=result;
  const s=state.strategies.find(x=>x.id===item.strategy);
  if(result==='win'){
    const profit=(item.odds-1)*item.stake;
    state.bank.currentBalance+=profit;
    state.bank.totalProfit+=profit;
    state.bank.wins++;
    if(s){s.wins++;s.profit+=profit}
  }else{
    state.bank.currentBalance-=item.stake;
    state.bank.totalProfit-=item.stake;
    state.bank.losses++;
    if(s){s.losses++;s.profit-=item.stake}
  }
  updateAll();
}

function showModal(id){document.getElementById('modal-'+id).classList.add('show')}
function hideModal(id){document.getElementById('modal-'+id).classList.remove('show')}

function switchPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.menu-bar button').forEach(b=>b.classList.remove('active'));
  const btns=[...document.querySelectorAll('.menu-bar button')];
  const idx={bank:0,strategies:1,history:2};
  if(btns[idx[id]])btns[idx[id]].classList.add('active');
}

function updateAll(){updateBank();updateStrategies();updateHistory()}

// Init Telegram WebApp
if(window.Telegram && Telegram.WebApp){
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

// Load real data from API
async function loadBank(){
  try{
    const r=await fetch('/api/bank');
    if(!r.ok)throw new Error('API unavailable');
    const data=await r.json();
    state.bank.startBalance=data.config.start_balance;
    state.bank.currentBalance=data.config.start_balance;
    state.bank.totalBets=0;state.bank.wins=0;state.bank.losses=0;state.bank.totalProfit=0;
    state.history=[];
    let totalProfit=0;
    Object.keys(data.strategies).forEach(key=>{
      const s=data.strategies[key];
      const st=state.strategies.find(x=>x.id===key);
      if(!st)return;
      st.bets=s.total_bets;st.wins=s.wins;st.losses=s.losses;st.profit=s.total_profit||0;
      state.bank.totalBets+=s.total_bets;state.bank.wins+=s.wins;state.bank.losses+=s.losses;
      totalProfit+=s.total_profit||0;
      (s.bets||[]).forEach(bet=>{
        state.history.push({strategy:key,match:bet.match,outcome:bet.outcome,odds:bet.odds,stake:bet.stake,date:(bet.placed_at||'').slice(0,10),result:bet.result||'pending'});
      });
    });
    state.bank.totalProfit=totalProfit;
    state.bank.currentBalance=data.config.start_balance+totalProfit;
  }catch(e){
    // Demo fallback
    const demo=[{strategy:'klubnika',match:'Zaglebie Sosnowiec - Nysa',outcome:'П2',odds:6.45,stake:500,date:'15.07.2026',result:'win'},{strategy:'p1_iz_1x',match:'The Strongest - Bolívar',outcome:'П1',odds:2.32,stake:500,date:'13.07.2026',result:'loss'}];
    demo.forEach(d=>{state.history.push(d);const s=state.strategies.find(x=>x.id===d.strategy);if(s)s.bets++;state.bank.totalBets++;if(d.result==='win'){const p=(d.odds-1)*d.stake;state.bank.currentBalance+=p;state.bank.totalProfit+=p;state.bank.wins++;if(s){s.wins++;s.profit+=p}}else{state.bank.currentBalance-=d.stake;state.bank.totalProfit-=d.stake;state.bank.losses++;if(s){s.losses++;s.profit-=d.stake}}});
  }
  updateAll();
}
loadBank();
</script>
</body>
</html>
