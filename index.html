<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🍓 Strawberry Bot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px 16px;text-align:center;border-bottom:1px solid #2a2a4a}
.header h1{font-size:22px;margin-bottom:4px}.header h1 span{color:#ff6b6b}
.balance{border:1px solid #3a3a5a;margin:16px;padding:20px;border-radius:16px;text-align:center}
.balance .lbl{font-size:12px;color:#888;text-transform:uppercase}
.balance .amt{font-size:36px;font-weight:700;margin:8px 0;color:#4ecdc4}
.balance .chg{font-size:14px;color:#4ecdc4}
.pages{padding:0 16px;flex:1;overflow-y:auto}
.page{display:none}.page.active{display:block}
.strat{background:#1a1a2e;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #2a2a4a}
.strat .nm{font-size:16px;font-weight:600}
.strat .inf{display:flex;gap:16px;margin-top:10px;font-size:13px;color:#888}
.strat .inf span .v{color:#e0e0e0;font-weight:600}
.mnu{display:flex;background:#1a1a2e;border-top:1px solid #2a2a4a;position:sticky;bottom:0}
.mnu button{flex:1;padding:16px 8px;background:none;border:none;color:#888;font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:.2s}
.mnu button .ic{font-size:22px}
.mnu button.on{color:#4ecdc4;background:#222244}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;text-align:center;margin-top:8px}
.btn.grn{background:#4ecdc4;color:#0f0f1a}
.btn.gry{background:#2a2a4a;color:#e0e0e0}
.hist{padding:12px 0;border-bottom:1px solid #2a2a4a;font-size:14px;display:flex;justify-content:space-between}
.hist .mt{flex:1}.hist .mt .tm{font-size:11px;color:#666;margin-top:2px}
.hist .res{font-weight:600}.hist .res.w{color:#4ecdc4}.hist .res.l{color:#ff6b6b}
.md{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.md.on{display:flex}
.md .box{background:#1a1a2e;border-radius:16px;padding:24px;width:90%;max-width:360px;border:1px solid #2a2a4a}
.md h3{margin-bottom:16px}
.md select,.md input{width:100%;padding:12px;border:1px solid #3a3a5a;border-radius:8px;background:#0f0f1a;color:#e0e0e0;font-size:16px;margin-bottom:12px;outline:none}
.empty{padding:40px 20px;text-align:center;color:#666}
.empty .ic{font-size:48px;margin-bottom:16px}
</style>
</head>
<body>

<div class="header"><h1><span>🍓</span> Strawberry Bot</h1><div style="font-size:12px;color:#888">Hermes Betting</div></div>

<!-- СТРАНИЦА: Банк -->
<div id="p-bank" class="page active">
  <div class="balance">
    <div class="lbl">Баланс банка</div>
    <div class="amt" id="bal-amt">10 000 ₽</div>
    <div class="chg" id="bal-chg">+0 ₽ (ROI 0%)</div>
  </div>
  <div style="padding:0 16px">
    <button class="btn grn" onclick="betShow()">➕ Новая ставка</button>
    <button class="btn gry" onclick="page('strats')">📊 Стратегии</button>
  </div>
</div>

<!-- СТРАНИЦА: Стратегии -->
<div id="p-strats" class="page">
  <div style="padding:16px">
    <div id="strats-list"></div>
    <button class="btn gry" onclick="page('hist')">📋 История</button>
    <button class="btn gry" onclick="page('bank')">💰 Банк</button>
  </div>
</div>

<!-- СТРАНИЦА: История -->
<div id="p-hist" class="page">
  <div style="padding:16px">
    <h2 style="font-size:18px;margin-bottom:16px">📋 История</h2>
    <div id="hist-list"></div>
    <button class="btn gry" onclick="page('strats')" style="margin-top:16px">← Назад</button>
  </div>
</div>

<!-- МОДАЛКА: Ставка -->
<div id="md-bet" class="md">
  <div class="box">
    <h3>➕ Новая ставка</h3>
    <select id="inp-s">
      <option value="klubnika">🍓 Клубника</option>
      <option value="p1_iz_1x">⚽️ П1 из 1X</option>
      <option value="basketball">🏀 Баскетбол</option>
    </select>
    <input id="inp-m" placeholder="Матч">
    <input id="inp-o" placeholder="Исход (П1/X/П2)">
    <input id="inp-k" placeholder="Коэффициент" type="number" step="0.01">
    <input id="inp-s2" placeholder="Сумма (500)" type="number" value="500">
    <button class="btn grn" onclick="betAdd()">✅ Поставить</button>
    <button class="btn gry" onclick="betHide()">Отмена</button>
  </div>
</div>

<!-- Нижнее меню -->
<div class="mnu">
  <button class="on" onclick="page('bank')"><span class="ic">💰</span>Банк</button>
  <button onclick="page('strats')"><span class="ic">📊</span>Стратегии</button>
  <button onclick="page('hist')"><span class="ic">📋</span>История</button>
  <button onclick="betShow()"><span class="ic">➕</span>Ставка</button>
</div>

<script>
// Init Telegram
if(window.Telegram && Telegram.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand()}

var B={bal:10000,start:10000,bets:0,wins:0,losses:0,pl:0}
var STS=[
  {id:'klubnika',nm:'🍓 Клубника',desc:'Betexplorer прогрузы',bets:0,wins:0,losses:0,pl:0},
  {id:'p1_iz_1x',nm:'⚽️ П1 из 1X',desc:'Zulubet / RoboBet',bets:0,wins:0,losses:0,pl:0},
  {id:'basketball',nm:'🏀 Баскетбол',desc:'Скоро',bets:0,wins:0,losses:0,pl:0}
]
var HIST=[]
var BETID=0

function fmt(n){return(n>0?'+':'')+n.toLocaleString('ru-RU')+' ₽'}
function pct(n,t){return t>0?((n/t)*100).toFixed(1):'0.0'}

function loadBank(){
  fetch('bank.json?'+Date.now()).then(function(r){return r.json()}).then(function(d){
    var sts={klubnika:STS[0],p1_iz_1x:STS[1],basketball:STS[2]}
    Object.keys(d.strategies).forEach(function(k){
      var s=d.strategies[k], js=sts[k]
      if(!js)return
      js.bets=s.total_bets||0; js.wins=s.wins||0; js.losses=s.losses||0; js.pl=s.total_profit||0
      if(k=='klubnika'){
        if(s.start_balance)B.start=s.start_balance
        if(s.current_balance)B.bal=s.current_balance
      }
      if(s.bets&&s.bets.length){
        s.bets.forEach(function(b){
          HIST.push({
            s:k, st:b.stake||500, m:b.match, o:b.outcome,
            k:b.odds, d:b.date||b.placed_at, t:b.match_time,
            r:b.status=='settled'?(b.result=='win'?'win':'loss'):'pending'
          })
        })
      }
    })
    upd()
  }).catch(function(){
    var dm=[
      {s:'klubnika',st:500,m:'Zaglebie Sosnowiec - Nysa',o:'П2',k:6.45,d:'15.07.2026',t:'17:00',r:'win'},
      {s:'klubnika',st:500,m:'LNZ Cherkasy - Goztepe',o:'П1',k:2.76,d:'15.07.2026',t:'17:00',r:'pending'},
      {s:'p1_iz_1x',st:500,m:'The Strongest - Bolívar',o:'П1',k:2.32,d:'13.07.2026',t:'23:15',r:'loss'},
      {s:'basketball',st:500,m:'CSKA Moscow - Zenit',o:'П1',k:1.95,d:'14.07.2026',t:'20:00',r:'win'},
      {s:'basketball',st:500,m:'Real Madrid - Barcelona',o:'П2',k:2.15,d:'15.07.2026',t:'22:00',r:'pending'}
    ]
    dm.forEach(function(x){
      HIST.push(x); var s=STS.find(function(y){return y.id==x.s})
      if(s)s.bets++
      if(x.r=='win'){var p=(x.k-1)*x.st;B.bal+=p;B.pl+=p;B.wins++;if(s){s.wins++;s.pl+=p}}
      else if(x.r=='loss'){B.bal-=x.st;B.pl-=x.st;B.losses++;if(s){s.losses++;s.pl-=x.st}}
    })
    upd()
  })
}

function upd(){
  var b=B
  document.getElementById('bal-amt').textContent=b.bal.toLocaleString('ru-RU')+' ₽'
  var d=b.bal-b.start, rp=pct(d,b.start)
  var el=document.getElementById('bal-chg')
  el.textContent=(d>=0?'+':'')+d.toLocaleString('ru-RU')+' ₽ (ROI '+(d>=0?'+':'')+rp+'%)'
  el.style.color=d>=0?'#4ecdc4':'#ff6b6b'

  var sl=document.getElementById('strats-list');sl.innerHTML=''
  STS.forEach(function(s){
    var roi=s.bets>0?pct(s.pl,s.bets*500):'0'
    sl.innerHTML+='<div class="strat" onclick="showStrat(\''+s.id+'\')">'+
      '<div class="nm">'+s.nm+'</div>'+
      '<div style="font-size:12px;color:#666">'+s.desc+'</div>'+
      '<div class="inf">'+
        '<span>Ставок: <span class="v">'+s.bets+'</span></span>'+
        '<span>W/L: <span class="v" style="color:#4ecdc4">'+s.wins+'</span>/<span class="v" style="color:#ff6b6b">'+s.losses+'</span></span>'+
        '<span>P&L: <span class="v" style="color:'+(s.pl>=0?'#4ecdc4':'#ff6b6b')+'">'+fmt(s.pl)+'</span></span>'+
        '<span>ROI: <span class="v">'+roi+'%</span></span>'+
      '</div></div>'
  })

  var hl=document.getElementById('hist-list');hl.innerHTML=''
  if(HIST.length==0){
    hl.innerHTML='<div class="empty"><div class="ic">📭</div>Нет ставок</div>'
  }else{
    for(var i=HIST.length-1;i>=0;i--){
      var h=HIST[i]; var dateStr = h.d || '—'
      hl.innerHTML+='<div class="hist">'+
        '<div class="mt">'+
          '<div style="font-size:13px;color:#888;margin-bottom:2px">'+dateStr+' · '+(h.t||'??:??')+' MSK</div>'+
          '<div>'+h.m+'</div>'+
          '<div style="margin-top:4px;display:flex;gap:8px;align-items:center">'+
            '<span style="font-size:13px;color:#4ecdc4;font-weight:600">'+h.o+'</span>'+
            '<span style="font-size:13px;color:#aaa">@ '+h.k.toFixed(2)+'</span>'+
            '<span style="font-size:12px;color:#666">'+h.st+'₽</span>'+
          '</div>'+
        '</div>'+
        '<div style="display:flex;flex-direction:column;align-items:flex-end">'+
          '<span style="font-size:11px;color:#666">'+(STS.find(function(x){return x.id==h.s})||{nm:''}).nm+'</span>'+
          '<span style="font-size:18px;margin-top:4px">'+(h.r=='pending'?'⏳':(h.r=='win'?'✅':'❌'))+'</span>'+
          '<span style="font-size:12px;'+(h.r=='win'?'color:#4ecdc4':'color:#ff6b6b')+';font-weight:600">'+
            (h.r=='pending'?'':(h.r=='win'?'+'+((h.k-1)*h.st).toFixed(0)+'₽':'-'+h.st+'₽'))+
          '</span>'+
        '</div>'+
      '</div>'
    }
  }
}

function page(id){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});document.getElementById('p-'+id).classList.add('active')}
function betShow(){document.getElementById('md-bet').classList.add('on')}
function betHide(){document.getElementById('md-bet').classList.remove('on')}
function betAdd(){
  var s=document.getElementById('inp-s').value; var m=document.getElementById('inp-m').value.trim()
  var o=document.getElementById('inp-o').value.trim().toUpperCase()
  var k=parseFloat(document.getElementById('inp-k').value); var st=parseFloat(document.getElementById('inp-s2').value)||500
  if(!m||!o||!k){alert('Заполните поля');return}
  HIST.push({s:s,st:st,m:m,o:o,k:k,d:new Date().toLocaleDateString('ru-RU'),r:'pending'})
  var sts=STS.find(function(x){return x.id==s});if(sts)sts.bets++
  document.getElementById('inp-m').value='';document.getElementById('inp-o').value=''
  document.getElementById('inp-k').value=''; betHide();page('hist');upd()
}
function showStrat(id){
  var s=STS.find(function(x){return x.id==id});if(!s)return
  var h=HIST.filter(function(x){return x.s==id})
  var msg=s.nm+'\nСтавок: '+s.bets+' | '+s.wins+'W/'+s.losses+'L\nP&L: '+fmt(s.pl)
  if(h.length==0)msg+='\n\nНет ставок'
  else{h.reverse().forEach(function(x){msg+='\n'+(x.r=='win'?'✅':'❌')+' '+x.m+' '+x.o+' @ '+x.k.toFixed(2)})}
  alert(msg)
}

loadBank()</script>
</body>
</html>
